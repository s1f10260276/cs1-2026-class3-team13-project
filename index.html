<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>学生がおすすめするお店</title>
    <link rel="stylesheet" href="./css/index_1.css">
  </head>

  <body>
    <header>
      <h1>みんなの推し飯</h1>
      <p>学生が本気でおすすめする飲食店紹介サイト</p>

      <nav>
        <a href="#about">このサイトについて</a>
        <a href="#members">メンバー</a>
        <a href="#shops">お店一覧</a>
        <a href="#details">店舗紹介</a>
      </nav>
    </header>

    <main>
      <section id="about">
        <h2>このサイトについて</h2>
        <p>メンバーが実際に行ったお気に入りのお店を紹介します。</p>
      </section>

      <section id="members">
        <h2>メンバー</h2>
        <p>3人のメンバーが、それぞれ2店舗ずつ紹介します。</p>
      </section>

      <section id="shops">
        <h2>お店一覧</h2>
        <p>ここに6店舗のカードを並べます。</p>
      </section>

      <section id="details">
        <h2>各店舗の紹介</h2>
        <p>ここにお店ごとの詳しい説明を書きます。</p>
      </section>
    </main>
  </body>
</html>
